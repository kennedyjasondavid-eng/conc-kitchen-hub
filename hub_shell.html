<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONC Kitchen — Production Hub</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f5f3ef;--sf:#fff;--bd:#d8d4cd;--bl:#e8e4dd;
    --tx:#2c2a26;--tm:#7a756b;
    --sa:#ed7d31;--sp:#c44e00;
    --lu:#dae3f3;--la:#2e75b6;
    --di:#e2efda;--da:#548235;
    --pr:#b4c6e7;--pa:#2e5090;
    --al:#ffd1dc;--aa:#8b0000;
    --so:#92d050;
    --bl-c:#b4c6e7;--ln-c:#fff2cc;--gc-c:#d9d9d9;--rx-c:#c8e6c9;
    --ac:#2e75b6;--wn:#e8a020;--wb:#fff3d6;
    --mv:#f0e6f6;--mc:#6a3d7c;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);padding:16px 20px;min-height:100vh}

  /* ─── TOP ──────────────────────────────────────── */
  .top{display:flex;align-items:center;gap:16px;margin-bottom:10px;padding:12px 18px;border-radius:10px;background:var(--tx);color:#fff}
  .top-logo{width:54px;height:54px;border-radius:8px;flex-shrink:0;image-rendering:crisp-edges}
  .top-tx{flex:1 1 auto;min-width:0}
  .top h1{font-size:26px;font-weight:700;letter-spacing:-.3px;color:#fff;line-height:1.15}
  .top h1 span{font-weight:400;opacity:.65;font-size:19px;margin-left:6px}
  .top-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.55);margin-top:2px}

  .wt{display:flex;gap:0;margin-bottom:8px;border-radius:8px;overflow:hidden;border:2px solid var(--tx);width:fit-content;margin-left:2px}
  .wt button{padding:7px 20px;font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer;background:var(--sf);color:var(--tx);transition:.12s;border-right:1px solid var(--bd);letter-spacing:.3px}
  .wt button:last-child{border-right:none}
  .wt button:hover{background:#eee}
  .wt button.on{background:var(--tx);color:#fff}
  .wt button.dis{color:#bbb;cursor:default;pointer-events:none}
  .wi{font-size:14px;color:var(--tm);font-weight:500;margin-bottom:10px}

  /* ─── FILTERS ──────────────────────────────────── */
  .filter-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .filter-row .fl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm)}
  .fb{display:flex;gap:0;border-radius:8px;overflow:hidden;border:2px solid var(--tx);width:fit-content}
  .fb button{padding:7px 14px;font-family:inherit;font-size:13.5px;font-weight:600;border:none;cursor:pointer;background:var(--sf);color:var(--tx);transition:.12s;border-right:1px solid var(--bd);letter-spacing:.3px}
  .fb button:last-child{border-right:none}
  .fb button:hover{background:#eee}
  .fb button.on{color:#fff}
  .fb button.on[data-s="all"]{background:#2c2a26}
  .fb button.on[data-s="Bloor"]{background:#4a7ab5}
  .fb button.on[data-s="LAN"]{background:#c9a800}
  .fb button.on[data-s="Rex"]{background:#548235}
  .vb{display:flex;gap:0;border-radius:8px;overflow:hidden;border:2px solid var(--tx);width:fit-content}
  .vb button{padding:7px 14px;font-family:inherit;font-size:13.5px;font-weight:600;border:none;cursor:pointer;background:var(--sf);color:var(--tx);transition:.12s;border-right:1px solid var(--bd);letter-spacing:.3px}
  .vb button:last-child{border-right:none}
  .vb button:hover{background:#eee}
  .vb button.on{color:#fff}
  .vb button.on[data-v="kitchen"]{background:#6a3d7c}
  .vb button.on[data-v="driver"]{background:var(--sp)}
  .vb button.off{color:var(--tm);background:#f0eeea;text-decoration:line-through}
  .fh{font-size:12.5px;color:var(--tm);margin-bottom:10px;min-height:14px;font-style:italic}

  /* ─── WEEK STRIP ───────────────────────────────── */
  .ws{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px}
  .dc{background:var(--sf);border:2px solid var(--bd);border-radius:10px;padding:9px;cursor:pointer;transition:.16s;min-height:200px;position:relative}
  .dc:hover{border-color:var(--ac);box-shadow:0 4px 16px rgba(46,117,182,.14);transform:translateY(-2px)}
  .dc-today{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac),0 4px 16px rgba(46,117,182,.18)}
  .dc-today .dh{color:var(--ac)}
  .dc-today::before{content:'TODAY';position:absolute;top:6px;left:9px;font-size:8px;font-weight:700;letter-spacing:.8px;color:#fff;background:var(--ac);padding:1px 6px;border-radius:3px}
  .dc .dh{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tm)}
  .dc .dn{font-size:24px;font-weight:700;color:var(--ac);line-height:1;margin-bottom:5px}
  .dc .dt{display:flex;flex-direction:column;gap:2px}
  .tg{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tg-s{background:var(--sa);color:#fff}.tg-l{background:var(--lu);color:var(--la)}.tg-d{background:var(--di);color:var(--da)}.tg-p{background:var(--pr);color:var(--pa)}.tg-v{background:var(--sp);color:#fff}.tg-m{background:var(--mv);color:var(--mc)}

  /* Fridge mini bars on card */
  .dc .fmini{margin-top:4px;display:flex;flex-direction:column;gap:2px}
  .fmrow{display:flex;align-items:center;gap:3px}
  .fmrow .fml{font-size:9.5px;font-weight:700;min-width:18px;color:var(--tm);text-transform:uppercase}
  .fmrow .fmt{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden}
  .fmrow .fmf{height:100%;border-radius:3px}
  .fmrow .fmp{font-size:9.5px;font-weight:600;font-family:'JetBrains Mono',monospace;min-width:22px;text-align:right}

  .dc .ic{text-align:right;margin-top:4px;font-size:11px;font-weight:600;color:var(--tm);font-family:'JetBrains Mono',monospace}
  .dc .cm{margin:3px 0 4px;padding:0 0 4px;border-bottom:1px solid var(--bd)}
  .dc .cml,.dc .cmd{font-size:10.5px;line-height:1.4;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dc .cml{color:var(--la)}.dc .cmd{color:var(--da)}
  .dc .cbj{margin:0 0 4px;padding:0 0 3px;border-bottom:1px solid var(--bd)}
  .dc .cbjr{font-size:10px;line-height:1.5;color:var(--pa);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wd{position:absolute;top:8px;right:9px;width:17px;height:17px;border-radius:50%;background:var(--wn);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,160,32,.4)}50%{box-shadow:0 0 0 6px rgba(232,160,32,0)}}

  /* ─── POPOVER ──────────────────────────────────── */
  .ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;backdrop-filter:blur(3px)}
  .ov.a{display:block}
  .pop{display:none;position:fixed;z-index:101;background:var(--sf);border-radius:12px;box-shadow:0 16px 56px rgba(0,0,0,.22);width:600px;max-height:85vh;overflow-y:auto;top:50%;left:50%;transform:translate(-50%,-50%)}
  .pop.a{display:block}
  .pop-hd{position:sticky;top:0;background:var(--tx);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:1;flex-wrap:wrap;gap:6px}
  .pop-hd h2{font-size:17px;font-weight:700;flex:1 1 auto}
  .pop-hd-b{display:flex;gap:4px;align-items:center}
  .pnav{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
  .pnav:hover{background:rgba(255,255,255,.3)} .pnav:disabled{opacity:.25;cursor:default;background:none}
  .pb{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-size:12px;font-weight:600;padding:5px 9px;border-radius:5px;cursor:pointer;transition:.12s;white-space:nowrap}
  .pb:hover{background:rgba(255,255,255,.24)}
  .px{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1;opacity:.7;transition:.12s;margin-left:6px}
  .px:hover{opacity:1}
  .pop-bd{padding:12px 16px 16px}

  /* Section headers */
  .ps{margin-bottom:10px}.ps:last-child{margin-bottom:0}
  .psh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:5px 10px;border-radius:5px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .psh.send-am{background:var(--sa);color:#fff}
  .psh.lunch{background:var(--lu);color:var(--la)}
  .psh.production{background:var(--pr);color:var(--pa)}
  .psh.dinner{background:var(--di);color:var(--da)}
  .psh.send-pm{background:var(--sp);color:#fff}
  .psh.movements{background:var(--mv);color:var(--mc)}
  .psh.fridge{background:#e8f5e9;color:#2e7d32}
  .psh-meal{font-size:11px;font-weight:400;opacity:.85;white-space:nowrap}

  .vl{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--tm);margin:1px 0 3px}

  /* Items */
  .pi{font-size:13px;line-height:1.45;padding:3px 0 3px 9px;border-left:3px solid var(--bl);margin-bottom:2px}
  .pi strong{font-weight:600}
  .tb{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:1px 5px;border-radius:3px;margin-right:2px;vertical-align:middle}
  .b-send{background:#fde8d5;color:var(--sa)}.b-heat{background:#fff2cc;color:#b8860b}.b-cook{background:#e2efda;color:var(--da)}.b-prep{background:#dae3f3;color:var(--la)}.b-soup{background:#d9f2c4;color:#3b6e12}.b-alt{background:var(--al);color:var(--aa)}.b-pull{background:#e8f5e9;color:#2e7d32}.b-park{background:var(--mv);color:var(--mc)}
  .st{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:2px;vertical-align:middle}
  .s-b{background:var(--bl-c);color:#1a3a5c}.s-l{background:var(--ln-c);color:#806600}.s-g{background:var(--gc-c);color:#444}.s-r{background:var(--rx-c);color:#2e7d32}
  .rt{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:2px;background:var(--mv);color:var(--mc);vertical-align:middle}
  .sv{display:inline-block;font-size:9.5px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:3px;background:#e8f5e9;color:#2e7d32;vertical-align:middle;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sv-adv{background:#fff3e0;color:#e65100}
  .sv-link{cursor:pointer;text-decoration:none;border-bottom:1px dashed currentColor}
  .sv-link:hover{filter:brightness(.88);border-bottom-style:solid}
  .meta{font-size:11px;color:var(--tm);font-family:'JetBrains Mono',monospace}
  .flag{color:var(--aa);font-weight:600}
  .hold-g{color:#2e7d32}.hold-y{color:#c9a800}.hold-r{color:#c62828}
  .empty-s{font-size:12px;color:var(--tm);font-style:italic;padding:2px 0 2px 9px}
  .wbn{background:var(--wb);border:1px solid var(--wn);border-radius:6px;padding:5px 10px;margin-bottom:8px;font-size:12.5px;font-weight:500;color:#8a6100}
  .wbn strong{font-weight:700}

  /* Fridge bars in popover */
  .fbar{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .fbar .fbl{font-size:12px;font-weight:600;min-width:52px}
  .fbar .fbt{flex:1;height:14px;background:#eee;border-radius:4px;overflow:hidden;position:relative}
  .fbar .fbf{height:100%;border-radius:4px;transition:width .5s}
  .fbar .fbp{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;min-width:50px;text-align:right}
  .fbar .fbi{font-size:10.5px;color:var(--tm);margin-top:1px;line-height:1.3}

  /* Flow arrow */
  .flow-arrow{display:inline-block;font-size:13px;color:var(--mc);margin:0 3px;vertical-align:middle}

  .rl{float:right;font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px;margin:2px 0 0 6px;background:#e8f5e9;color:#2e7d32;cursor:pointer;text-decoration:none;border:1px solid #c8e6c9;transition:.12s;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rl:hover{background:#c8e6c9;color:#1b5e20}

  /* ─── OVERVIEW ─────────────────────────────────── */
  #ow{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:var(--bg);overflow-y:auto}
  #ow.a{display:block}
  .ow-bar{position:sticky;top:0;z-index:1;background:var(--tx);color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .ow-bar h2{font-size:17px;font-weight:700;flex:1 1 auto}
  .ow-bar .pb{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:inherit;font-size:12px;font-weight:600;padding:5px 9px;border-radius:5px;cursor:pointer;transition:.12s;white-space:nowrap}
  .ow-bar .pb:hover{background:rgba(255,255,255,.24)}
  .ow-bd{max-width:800px;margin:0 auto;padding:16px 20px 40px}
  .ow-day{margin-bottom:16px;border:2px solid var(--bd);border-radius:10px;overflow:hidden}
  .ow-day .ow-dh{background:var(--tx);color:#fff;padding:7px 14px;font-size:15px;font-weight:700}
  .ow-day .ow-db{padding:10px 14px}
  .ob{padding:5px 14px;font-family:inherit;font-size:13.5px;font-weight:600;border:2px solid var(--tx);border-radius:8px;cursor:pointer;background:var(--sf);color:var(--tx);transition:.12s;white-space:nowrap}
  .ob:hover{background:var(--tx);color:#fff}

  /* ─── PRINT ────────────────────────────────────── */
  #pa{display:none}
  #pa.pr-measure{display:block!important;position:absolute;left:-9999px;top:0;width:7.5in;font-size:12px}
  #pa .pr-page-inner{transform-origin:top left}
  @media print{
    @page{size:letter;margin:0.5in}
    body{background:#fff;padding:0;font-size:12px}
    .top,.wt,.wi,.filter-row,.fh,.ws,.ov,.pop,#sf{display:none!important}
    #ow:not(.a){display:none!important}
    #ow.a{position:static;overflow:visible}
    #ow.a .ow-bar{position:static;background:#2c2a26;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #ow.a .ow-bar .pb,#ow.a .ow-bar .px{display:none!important}
    #ow.a ~ #sf{display:none!important}
    #ow.a .ow-day{page-break-inside:avoid;margin-bottom:10px}
    #ow.a .ow-day .ow-dh{-webkit-print-color-adjust:exact;print-color-adjust:exact;page-break-after:avoid}
    #pa{display:none}
    #pa.pr-active{display:block!important;position:static;width:100%}
    #pa .prh{text-align:center;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px;page-break-after:avoid}
    #pa .prh h1{font-size:16px;font-weight:700}
    #pa .prh .prs{font-size:13px;color:#555}
    #pa .pr-page.new-page{page-break-before:always}
    #pa .pr-page{page-break-inside:avoid;position:relative}
    #pa .prd{margin-bottom:12px;border:1px solid #ccc;border-radius:6px;overflow:hidden}
    #pa .prdh{background:#2c2a26;color:#fff;padding:5px 10px;font-size:14px;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;page-break-after:avoid}
    #pa .prdb{padding:6px 10px}
    #pa .page-hdr{text-align:center;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
    #pa .page-hdr h3{font-size:15px;font-weight:700}
    #pa .page-hdr .page-sub{font-size:12px;color:#555}
    .psh,.tb,.st,.rt{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #pa .psh{font-size:11px;padding:3px 6px;margin-top:5px;page-break-after:avoid}
    #pa .pi{font-size:12px;padding:2px 0 2px 7px;border-left:2px solid #ccc}
    #pa .vl{font-size:11px}#pa .meta{font-size:10px}
    #pa .wbn{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #pa .fbar .fbf{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

  @media(max-width:700px){.pop{width:96vw} #srch{width:140px}}
  

  /* ─── STATIC FALLBACK ─────────────────────────── */
  #sf{display:block}
  #sf details summary::-webkit-details-marker{display:none}
  #sf details summary{list-style:none}
  #sf details[open] summary span:last-child{opacity:0}
  .js-ready #sf{display:none}
  #sf-mob{display:block}
  .js-ready #sf-mob{display:none}
  .top,.wt,.wi,.filter-row,.fh,.ws{display:none}
  .js-ready .top{display:flex}
  .js-ready .wt{display:flex}
  .js-ready .wi{display:block}
  .js-ready .filter-row{display:flex}
  .js-ready .fh{display:block}
  .js-ready .ws{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

</style>
