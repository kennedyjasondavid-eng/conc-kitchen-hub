# CONC Kitchen Production Hub — Deploy to GitHub Pages
# Triggers on push to main. Serves hub HTML from repo root,
# runs generate_all.py for xlsx spreadsheet downloads.
#
# Workflow:
#   1. Build hub locally with CONC_Hub_Builder.html
#   2. Upload CONC_Production_Hub.html + 00_Production_Source_Table.xlsx to repo
#   3. Actions generates xlsx files and deploys everything to Pages
#
# Setup (one-time):
#   1. In repo Settings → Pages → Source: set to "GitHub Actions"
#   2. Ensure these files exist in repo root:
#      - 00_Production_Source_Table.xlsx (the single source of truth)
#      - generate_all.py
#      - hub_shell.html, hub_rcp.js, hub_logic.js (template parts)
#      - CONC_Production_Hub.html (built locally with Hub Builder)

name: Deploy Hub

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate xlsx outputs
        run: python3 generate_all.py --xlsx-only

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site

          # Hub HTML: use the builder-generated file from repo root
          cp CONC_Production_Hub.html _site/index.html

          # Spreadsheet downloads (source table from root; generated files from outputs/)
          cp 00_Production_Source_Table.xlsx _site/
          cp outputs/01_Production_Schedule_generated.xlsx _site/ 2>/dev/null || true
          cp outputs/03_Driver_Schedule_generated.xlsx _site/ 2>/dev/null || true
          cp outputs/Labour_Report_generated.xlsx _site/ 2>/dev/null || true
          cp Renovation_4_Week_Menu5.xlsx _site/ 2>/dev/null || true

          echo "── Pages artifact contents ──"
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
